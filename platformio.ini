; ================================================================
;  PlatformIO Project Configuration
;  Project : ESP32 WiFi Mobile Robot
;  Target  : ESP32 Dev Module (Dual-Core, 240 MHz)
;  Framework: Arduino (C language only)
; ================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial upload & monitor
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

; Use "min_spiffs" partition to maximize app space
board_build.partitions = min_spiffs.csv

; Dependencies
lib_deps =
    esphome/AsyncTCP-esphome @ ^2.1.4
    mathieucarbou/ESPAsyncWebServer @ ^3.3.12
    bblanchon/ArduinoJson @ ^7.2.1
    madhephaestus/ESP32Servo @ ^3.0.6

; Build flags
;   -x c          : treat all source files as C (not C++)
;   -std=gnu11    : C11 standard with GNU extensions
build_flags =
    -x c
    -std=gnu11
    -DCORE_DEBUG_LEVEL=0
    -O2
